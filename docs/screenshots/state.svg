<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 314.556 513.175" width="314.556" height="513.175" style="--bg:#FFFFFF;--fg:#27272A;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 55%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 35%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 32%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 70%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 4%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 14%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 4%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 8%, var(--bg));
  }
  .node, .actor, .entity, .class-node { filter: drop-shadow(0 1px 3px rgba(0,0,0,.07)); }
  .subgraph { filter: drop-shadow(0 1px 2px rgba(0,0,0,.04)); }
</style>

<defs>
  <marker id="arrowhead" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto">
    <polygon points="0 0, 12 6, 0 12" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="1" refY="6" orient="auto-start-reverse">
    <polygon points="12 0, 0 6, 12 12" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>

<polyline class="edge" data-from="_start" data-to="Idle" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="85,445.17499999999995 85,395.48749999999995" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Idle" data-to="Processing" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="submit" points="121.222,372.38750000000005 205,372.38750000000005 207.67878402655563,371.854656727579 209.94974746830582,370.3372474683059 211.467156727579,368.06628402655565 212,365.38750000000005 212,279.6875" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Processing" data-to="Success" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="ok" points="212,233.48749999999995 212,163.88750000000005" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Processing" data-to="Failed" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="error" points="149.44400000000002,256.5875 99.5,256.5875 96.82121597344437,256.05465672757896 94.55025253169417,254.53724746830585 93.03284327242099,252.26628402655558 92.5,249.58749999999998 92.5,163.88750000000005" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Success" data-to="_end" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="212,117.6875 212,68" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Failed" data-to="Idle" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="retry" points="77.5,163.88750000000005 77.5,349.2874999999999" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="Idle" data-to="Processing" data-label="submit">
  <rect x="168.88312506088081" y="339.4168932495691" width="50.20000000000001" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="193.9831250608808" y="355.2168932495691" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">submit</text>
</g>
<g class="edge-label" data-from="Processing" data-to="Success" data-label="ok">
  <rect x="182.82" y="179.37250000000012" width="30.76" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="198.2" y="195.17250000000013" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">ok</text>
</g>
<g class="edge-label" data-from="Processing" data-to="Failed" data-label="error">
  <rect x="84.18944016223944" y="219.55374148743618" width="46.312000000000005" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="107.34544016223944" y="235.3537414874362" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">error</text>
</g>
<g class="edge-label" data-from="Failed" data-to="Idle" data-label="retry">
  <rect x="41.84" y="237.24416666666667" width="43.72" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="63.7" y="253.04416666666668" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">retry</text>
</g>
<g class="node" data-id="_start" data-label="" data-shape="statestart">
  <circle cx="85" cy="459.17499999999995" r="12" fill="var(--_text)" stroke="none" />
  
</g>
<g class="node" data-id="Idle" data-label="Idle" data-shape="rounded">
  <rect x="48.778000000000006" y="349.2874999999999" width="72.44399999999999" height="46.200000000000045" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="85" y="372.38749999999993" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Idle</text>
</g>
<g class="node" data-id="Processing" data-label="Processing" data-shape="rounded">
  <rect x="149.44400000000002" y="233.48749999999995" width="125.11199999999997" height="46.200000000000045" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="212" y="256.5875" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Processing</text>
</g>
<g class="node" data-id="Success" data-label="Success" data-shape="rounded">
  <rect x="158.222" y="117.6875" width="107.55599999999998" height="46.200000000000045" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="212" y="140.78750000000002" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Success</text>
</g>
<g class="node" data-id="Failed" data-label="Failed" data-shape="rounded">
  <rect x="40" y="117.6875" width="90" height="46.200000000000045" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="85" y="140.78750000000002" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Failed</text>
</g>
<g class="node" data-id="_end" data-label="" data-shape="stateend">
  <circle cx="212" cy="54" r="12" fill="none" stroke="var(--_text)" stroke-width="3" />
<circle cx="212" cy="54" r="8" fill="var(--_text)" stroke="none" />
  
</g>
</svg>