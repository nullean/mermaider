<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" style="--bg:#FFFFFF;--fg:#27272A;--accent:#3b82f6">
<style>
  text { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  .mono { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 55%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 35%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 32%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 70%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 4%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 22%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 4%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 8%, var(--bg));
    --_accent-fill:   color-mix(in srgb, var(--accent, var(--fg)) 8%, var(--bg));
    --_accent-stroke: color-mix(in srgb, var(--accent, var(--fg)) 20%, var(--bg));
    --_accent-text:   color-mix(in srgb, var(--accent, var(--fg)) 65%, var(--bg));
  }
  .node, .actor, .entity, .class-node { filter: drop-shadow(0 1px 3px rgba(0,0,0,.07)); }
  .subgraph { filter: drop-shadow(0 1px 2px rgba(0,0,0,.04)); }
</style>

<defs>
</defs>

<rect x="2" y="2" width="296" height="396" rx="3" ry="3" fill="#4e79a7" opacity="0.8" stroke="var(--bg)" stroke-width="1" />
<text x="150" y="14" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Engineering</text>
<text x="150" y="28" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">50</text>
<rect x="302" y="2" width="146" height="396" rx="3" ry="3" fill="#f28e2b" opacity="0.8" stroke="var(--bg)" stroke-width="1" />
<text x="375" y="14" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Marketing</text>
<text x="375" y="28" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">25</text>
<rect x="452" y="2" width="86" height="396" rx="3" ry="3" fill="#e15759" opacity="0.8" stroke="var(--bg)" stroke-width="1" />
<text x="495" y="14" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Sales</text>
<text x="495" y="28" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">15</text>
<rect x="542" y="2" width="56" height="396" rx="3" ry="3" fill="#76b7b2" opacity="0.8" stroke="var(--bg)" stroke-width="1" />
<text x="570" y="14" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Support</text>
<text x="570" y="28" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">10</text>
</svg>