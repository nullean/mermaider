  <rect x="152" y="190" width="64" height="46.19999999999999" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="184" y="213.1" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">B</text>
</g>
<g class="node" data-id="C" data-label="C" data-shape="rectangle">
  <rect x="152" y="115" width="64" height="46.199999999999996" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="184" y="138.1" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">C</text>
</g>
