<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1136.952 212.364" width="1136.952" height="212.364" style="--bg:#FFFFFF;--fg:#27272A;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 55%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 35%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 32%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 70%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 4%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 14%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 4%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 8%, var(--bg));
  }
  .node, .actor, .entity, .class-node { filter: drop-shadow(0 1px 3px rgba(0,0,0,.07)); }
  .subgraph { filter: drop-shadow(0 1px 2px rgba(0,0,0,.04)); }
</style>

<defs>
  <marker id="arrowhead" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto">
    <polygon points="0 0, 12 6, 0 12" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="1" refY="6" orient="auto-start-reverse">
    <polygon points="12 0, 0 6, 12 12" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>

<path class="edge" data-from="A" data-to="B" data-style="solid" data-arrow-start="false" data-arrow-end="true" d="M153.94,106.182 L225.94,106.182" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<path class="edge" data-from="B" data-to="C" data-style="solid" data-arrow-start="false" data-arrow-end="true" d="M333.496,106.182 L405.496,106.182" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<path class="edge" data-from="C" data-to="D" data-style="solid" data-arrow-start="false" data-arrow-end="true" d="M505.072,106.182 L577.072,106.182" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<path class="edge" data-from="D" data-to="E" data-style="solid" data-arrow-start="false" data-arrow-end="true" d="M709.436,106.182 L781.436,106.182" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<path class="edge" data-from="E" data-to="F" data-style="solid" data-arrow-start="false" data-arrow-end="true" d="M889.436,106.182 L961.436,106.182" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<g class="node" data-id="A" data-label="Rectangle" data-shape="rectangle">
  <rect x="40" y="83.082" width="113.94" height="46.2" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="96.97" y="106.18199999999999" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Rectangle</text>
</g>
