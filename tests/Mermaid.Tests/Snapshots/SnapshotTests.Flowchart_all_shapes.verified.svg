<polyline class="edge" data-from="E" data-to="F" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="793.4360000000001,106.182 841.4360000000001,106.182" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<g class="node" data-id="D" data-label="Diamond" data-shape="diamond">
