  <rect x="225.94" y="83.082" width="107.556" height="46.2" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="279.718" y="106.18199999999999" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Rounded</text>
</g>
<g class="node" data-id="C" data-label="Stadium" data-shape="stadium">
  <rect x="405.496" y="83.082" width="99.576" height="46.2" rx="23.1" ry="23.1" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="455.284" y="106.18199999999999" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Stadium</text>
</g>
<g class="node" data-id="D" data-label="Diamond" data-shape="diamond">
  <polygon points="643.254,40 709.436,106.182 643.254,172.364 577.072,106.182" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="643.254" y="106.182" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Diamond</text>
</g>
<g class="node" data-id="E" data-label="Circle" data-shape="circle">
  <circle cx="835.436" cy="106.182" r="54" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="835.436" y="106.182" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Circle</text>
</g>
<g class="node" data-id="F" data-label="Asymmetric" data-shape="asymmetric">
  <polygon points="973.436,83.082 1096.952,83.082 1096.952,129.28199999999998 973.436,129.28199999999998 961.436,106.18199999999999" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="1029.194" y="106.18199999999999" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Asymmetric</text>
</g>
</svg>