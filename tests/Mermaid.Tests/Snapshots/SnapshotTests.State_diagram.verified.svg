<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 205.11199999999997 513.175" width="205.11199999999997" height="513.175" style="--bg:#FFFFFF;--fg:#27272A;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 55%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 35%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 32%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 70%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 4%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 14%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 4%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 8%, var(--bg));
  }
  .node, .actor, .entity, .class-node { filter: drop-shadow(0 1px 3px rgba(0,0,0,.07)); }
  .subgraph { filter: drop-shadow(0 1px 2px rgba(0,0,0,.04)); }
</style>

<defs>
  <marker id="arrowhead" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto">
    <polygon points="0 0, 12 6, 0 12" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="1" refY="6" orient="auto-start-reverse">
    <polygon points="12 0, 0 6, 12 12" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>

<polyline class="edge" data-from="_start" data-to="Idle" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="102.55599999999998,445.17499999999995 102.55599999999998,395.48749999999995" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Idle" data-to="Processing" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="start" points="102.55599999999998,349.2874999999999 102.55599999999998,279.6875" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Processing" data-to="Done" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="complete" points="102.55599999999998,233.48749999999995 102.55599999999998,163.88750000000005" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Done" data-to="_end" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="102.55599999999998,117.6875 102.55599999999998,68" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="Idle" data-to="Processing" data-label="start">
  <rect x="68.19199999999998" y="299.0218999999999" width="41.128" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="88.75599999999999" y="314.8218999999999" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">start</text>
</g>
<g class="edge-label" data-from="Processing" data-to="Done" data-label="complete">
  <rect x="39.395999999999965" y="182.8875" width="63.16000000000001" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="70.97599999999997" y="198.6875" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">complete</text>
</g>
<g class="node" data-id="_start" data-label="" data-shape="statestart">
  <circle cx="102.55599999999998" cy="459.17499999999995" r="12" fill="var(--_text)" stroke="none" />
  
</g>
<g class="node" data-id="Idle" data-label="Idle" data-shape="rounded">
  <rect x="66.33399999999999" y="349.2874999999999" width="72.44399999999999" height="46.200000000000045" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="102.55599999999998" y="372.38749999999993" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Idle</text>
</g>
<g class="node" data-id="Processing" data-label="Processing" data-shape="rounded">
  <rect x="39.99999999999999" y="233.48749999999995" width="125.11199999999998" height="46.200000000000045" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="102.55599999999998" y="256.5875" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Processing</text>
</g>
<g class="node" data-id="Done" data-label="Done" data-shape="rounded">
  <rect x="60.74799999999998" y="117.6875" width="83.616" height="46.200000000000045" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
  <text x="102.55599999999998" y="140.78750000000002" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Done</text>
</g>
<g class="node" data-id="_end" data-label="" data-shape="stateend">
  <circle cx="102.55599999999998" cy="54" r="12" fill="none" stroke="var(--_text)" stroke-width="3" />
<circle cx="102.55599999999998" cy="54" r="8" fill="var(--_text)" stroke="none" />
  
</g>
</svg>