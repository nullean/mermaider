<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 191.60399999999998 482.6750000000002" width="191.60399999999998" height="482.6750000000002" style="--bg:#FFFFFF;--fg:#27272A;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>

<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>

<polyline class="edge" data-from="_start" data-to="Idle" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="95.80199999999999,414.6750000000002 95.80199999999999,364.9875000000002" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Idle" data-to="Processing" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="start" points="95.80199999999999,328.0875000000001 95.80199999999999,259.78750000000014" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Processing" data-to="Done" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="complete" points="95.80199999999999,222.88750000000005 95.80199999999999,154.5875000000001" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Done" data-to="_end" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="95.80199999999999,117.6875 95.80199999999999,68" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="Idle" data-to="Processing" data-label="start">
  <rect x="63.134999999999984" y="279.41070000000013" width="39.034000000000006" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="82.65199999999999" y="294.5607000000001" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">start</text>
</g>
<g class="edge-label" data-from="Processing" data-to="Done" data-label="complete">
  <rect x="36.571999999999974" y="173.58750000000006" width="59.23000000000001" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="66.18699999999998" y="188.73750000000007" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">complete</text>
</g>
<g class="node" data-id="_start" data-label="" data-shape="statestart">
  <circle cx="95.80199999999999" cy="428.6750000000002" r="12" fill="var(--_text)" stroke="none" />
  
</g>
<g class="node" data-id="Idle" data-label="Idle" data-shape="rounded">
  <rect x="64.453" y="328.0875000000001" width="62.69799999999999" height="36.90000000000009" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="95.80199999999999" y="346.53750000000014" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Idle</text>
</g>
<g class="node" data-id="Processing" data-label="Processing" data-shape="rounded">
  <rect x="39.99999999999999" y="222.88750000000005" width="111.604" height="36.90000000000009" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="95.80199999999999" y="241.3375000000001" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Processing</text>
</g>
<g class="node" data-id="Done" data-label="Done" data-shape="rounded">
  <rect x="59.26599999999999" y="117.6875" width="73.072" height="36.90000000000009" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="95.80199999999999" y="136.13750000000005" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Done</text>
</g>
<g class="node" data-id="_end" data-label="" data-shape="stateend">
  <circle cx="95.80199999999999" cy="54" r="12" fill="none" stroke="var(--_text)" stroke-width="1.5" />
<circle cx="95.80199999999999" cy="54" r="8" fill="var(--_text)" stroke="none" />
  
</g>
</svg>