<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320" style="--bg:#FFFFFF;--fg:#27272A;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>

<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>

<g class="block" data-type="alt" data-label="Success">
  <rect x="30" y="78" width="240" height="124" rx="0" ry="0" fill="none" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="30" y="78" width="85.63000000000001" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="36" y="87" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">alt [Success]</text>
  <line x1="30" y1="154" x2="270" y2="154" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
  <text x="38" y="168" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">[Failure]</text>
</g>
<g class="block" data-type="loop" data-label="Retry">
  <rect x="30" y="210" width="240" height="60" rx="0" ry="0" fill="none" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="30" y="210" width="77.71" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="36" y="219" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">loop [Retry]</text>
</g>
<line class="lifeline" data-actor="A" x1="80" y1="70" x2="80" y2="290" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="B" x1="220" y1="70" x2="220" y2="290" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="A" data-to="B" data-label="OK" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="80" y1="118" x2="220" y2="118" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="150" y="112" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">OK</text>
</g>
<g class="message" data-from="A" data-to="B" data-label="Error" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="80" y1="182" x2="220" y2="182" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="150" y="176" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Error</text>
</g>
<g class="message" data-from="A" data-to="B" data-label="Ping" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="80" y1="250" x2="220" y2="250" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="150" y="244" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Ping</text>
</g>
<g class="actor" data-id="A" data-label="A" data-type="participant">
  <rect x="40" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="80" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">A</text>
</g>
<g class="actor" data-id="B" data-label="B" data-type="participant">
  <rect x="180" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="220" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">B</text>
</g>
</svg>