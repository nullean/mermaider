  <rect x="63.855999999999995" y="312.7075" width="70.108" height="36.90000000000009" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="98.91" y="331.1575" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Start</text>
</g>
