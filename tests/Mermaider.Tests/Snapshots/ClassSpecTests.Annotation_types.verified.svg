  <line x1="211.2" y1="96" x2="331.2" y2="96" stroke="var(--_node-stroke)" stroke-width="2" />
  <text class="mono" x="219.2" y="110" dy="0.35em" font-size="12" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">draw()</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">void</tspan></text>
</g>
