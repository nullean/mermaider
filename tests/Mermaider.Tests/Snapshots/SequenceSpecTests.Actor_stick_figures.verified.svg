<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200" style="--bg:#FFFFFF;--fg:#27272A;--accent:#3b82f6">
<style>
  text { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  .mono { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 55%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 35%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 32%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 70%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 4%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 22%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 4%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 8%, var(--bg));
    --_accent-fill:   color-mix(in srgb, var(--accent, var(--fg)) 8%, var(--bg));
    --_accent-stroke: color-mix(in srgb, var(--accent, var(--fg)) 20%, var(--bg));
    --_accent-text:   color-mix(in srgb, var(--accent, var(--fg)) 65%, var(--bg));
  }
  .node, .actor, .entity, .class-node { filter: drop-shadow(0 1px 3px rgba(0,0,0,.07)); }
  .subgraph { filter: drop-shadow(0 1px 2px rgba(0,0,0,.04)); }
</style>

<defs>
  <marker id="seq-arrow" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto-start-reverse">
    <polygon points="0 0, 12 6, 0 12" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto-start-reverse">
    <polyline points="0 0, 12 6, 0 12" fill="none" stroke="var(--_arrow)" stroke-width="1.5" />
  </marker>
</defs>

<line class="lifeline" data-actor="Alice" x1="70" y1="70" x2="70" y2="170" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Bob" x1="210" y1="70" x2="210" y2="170" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="Alice" data-to="Bob" data-label="Hi Bob" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="70" y1="90" x2="210" y2="90" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#seq-arrow)" />
  <text x="140" y="80" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Hi Bob</text>
</g>
<g class="message" data-from="Bob" data-to="Alice" data-label="Hey Alice" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="130" x2="70" y2="130" stroke="var(--_line)" stroke-width="2.25" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="140" y="120" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Hey Alice</text>
</g>
<g class="actor" data-id="Alice" data-label="Alice" data-type="actor">
  <g transform="translate(52,32) scale(1.5)">
    <path d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" fill="none" stroke="var(--_line)" stroke-width="1.1666666666666667" />
    <path d="M15 10C15 11.6569 13.6569 13 12 13C10.3431 13 9 11.6569 9 10C9 8.34315 10.3431 7 12 7C13.6569 7 15 8.34315 15 10Z" fill="none" stroke="var(--_line)" stroke-width="1.1666666666666667" />
    <path d="M5.62842 18.3563C7.08963 17.0398 9.39997 16 12 16C14.6 16 16.9104 17.0398 18.3716 18.3563" fill="none" stroke="var(--_line)" stroke-width="1.1666666666666667" />
  </g>
  <text x="70" y="84" font-size="14" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Alice</text>
</g>
<g class="actor" data-id="Bob" data-label="Bob" data-type="actor">
  <g transform="translate(192,32) scale(1.5)">
    <path d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" fill="none" stroke="var(--_line)" stroke-width="1.1666666666666667" />
    <path d="M15 10C15 11.6569 13.6569 13 12 13C10.3431 13 9 11.6569 9 10C9 8.34315 10.3431 7 12 7C13.6569 7 15 8.34315 15 10Z" fill="none" stroke="var(--_line)" stroke-width="1.1666666666666667" />
    <path d="M5.62842 18.3563C7.08963 17.0398 9.39997 16 12 16C14.6 16 16.9104 17.0398 18.3716 18.3563" fill="none" stroke="var(--_line)" stroke-width="1.1666666666666667" />
  </g>
  <text x="210" y="84" font-size="14" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Bob</text>
</g>
</svg>