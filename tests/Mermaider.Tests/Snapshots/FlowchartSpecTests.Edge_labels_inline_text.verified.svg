  <rect x="160" y="40" width="64" height="46.2" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="192" y="63.1" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">C</text>
</g>
<g class="node" data-id="D" data-label="D" data-shape="rectangle">
  <rect x="160" y="158.2" width="64" height="46.2" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="192" y="181.29999999999998" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">D</text>
</g>
<g class="node" data-id="E" data-label="E" data-shape="rectangle">
  <rect x="280" y="40" width="64" height="46.2" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="312" y="63.1" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">E</text>
</g>
<g class="node" data-id="F" data-label="F" data-shape="rectangle">
  <rect x="280" y="158.2" width="64" height="46.2" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
