<text x="192" y="115" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">text on dotted</text>
</g>
<g class="edge-label" data-from="E" data-to="F" data-label="text on thick">
  <rect x="273.29200000000003" y="99.2" width="77.416" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="312" y="115" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">text on thick</text>
</g>
<g class="node" data-id="A" data-label="A" data-shape="rectangle">
  <rect x="40" y="40" width="64" height="46.2" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="72" y="63.1" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">A</text>
</g>
