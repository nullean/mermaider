<text x="201.11199999999997" y="340.58" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">done</text>
</g>
<g class="node" data-id="_start" data-label="" data-shape="statestart">
  <circle cx="102.55599999999998" cy="60" r="12" fill="var(--_text)" stroke="none" />
  
</g>
<g class="node" data-id="Booting" data-label="Booting" data-shape="rounded">
  <rect x="53.565999999999995" y="152" width="97.97999999999999" height="46.2" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
