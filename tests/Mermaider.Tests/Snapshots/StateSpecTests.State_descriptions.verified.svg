</g>
<g class="node" data-id="Processing" data-label="Processing" data-shape="rounded">
  <rect x="40" y="388.4" width="125.11199999999998" height="46.2" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="102.55599999999998" y="411.5" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Processing</text>
</g>
</svg>