<path class="edge" data-from="Booting" data-to="Ready" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="initialized" d="M102.55599999999998,198.2 L102.55599999999998,270.2" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
