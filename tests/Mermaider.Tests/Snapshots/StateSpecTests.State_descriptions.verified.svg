<path class="edge" data-from="Processing" data-to="Ready" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="done" d="M165.11199999999997,411.5 L195.11199999999997,411.5 Q201.11199999999997,411.5 201.11199999999997,405.5 L201.11199999999997,299.29999999999995 Q201.11199999999997,293.29999999999995 195.11199999999997,293.29999999999995 L148.35399999999998,293.29999999999995" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
