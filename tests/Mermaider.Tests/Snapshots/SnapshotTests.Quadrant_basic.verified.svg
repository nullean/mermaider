<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 580" width="540" height="580" style="--bg:#FFFFFF;--fg:#27272A;--accent:#3b82f6">
<style>
  text { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  .mono { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 55%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 35%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 32%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 70%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 4%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 22%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 4%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 8%, var(--bg));
    --_accent-fill:   color-mix(in srgb, var(--accent, var(--fg)) 8%, var(--bg));
    --_accent-stroke: color-mix(in srgb, var(--accent, var(--fg)) 20%, var(--bg));
    --_accent-text:   color-mix(in srgb, var(--accent, var(--fg)) 65%, var(--bg));
  }
  .node, .actor, .entity, .class-node { filter: drop-shadow(0 1px 3px rgba(0,0,0,.07)); }
  .subgraph { filter: drop-shadow(0 1px 2px rgba(0,0,0,.04)); }
</style>

<defs>
</defs>

<text x="280" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="var(--_text)">Priority Matrix</text>
<rect x="80" y="92" width="200" height="200" fill="color-mix(in srgb, var(--accent, var(--fg)) 8%, var(--bg))" />
<text x="180" y="112" text-anchor="middle" dy="0.35em" font-size="14" font-weight="600" fill="var(--_text-sec)">Schedule</text>
<rect x="280" y="92" width="200" height="200" fill="color-mix(in srgb, var(--accent, var(--fg)) 12%, var(--bg))" />
<text x="380" y="112" text-anchor="middle" dy="0.35em" font-size="14" font-weight="600" fill="var(--_text-sec)">Do First</text>
<rect x="80" y="292" width="200" height="200" fill="color-mix(in srgb, var(--accent, var(--fg)) 4%, var(--bg))" />
<text x="180" y="312" text-anchor="middle" dy="0.35em" font-size="14" font-weight="600" fill="var(--_text-sec)">Delegate</text>
<rect x="280" y="292" width="200" height="200" fill="color-mix(in srgb, var(--accent, var(--fg)) 6%, var(--bg))" />
<text x="380" y="312" text-anchor="middle" dy="0.35em" font-size="14" font-weight="600" fill="var(--_text-sec)">Eliminate</text>
<rect x="80" y="92" width="400" height="400" fill="none" stroke="var(--_node-stroke)" stroke-width="1.5" />
<line x1="280" y1="92" x2="280" y2="492" stroke="var(--_node-stroke)" stroke-width="1" stroke-dasharray="4 3" />
<line x1="80" y1="292" x2="480" y2="292" stroke="var(--_node-stroke)" stroke-width="1" stroke-dasharray="4 3" />
<text x="80" y="516" text-anchor="start" font-size="12" fill="var(--_text-sec)">Low Effort</text>
<text x="480" y="516" text-anchor="end" font-size="12" fill="var(--_text-sec)">High Effort</text>
<text x="72" y="492" text-anchor="end" font-size="12" fill="var(--_text-sec)" transform="rotate(-90, 72, 492)">Low Impact</text>
<text x="72" y="92" text-anchor="end" font-size="12" fill="var(--_text-sec)" transform="rotate(-90, 72, 92)">High Impact</text>
<circle cx="400" cy="132" r="6" fill="var(--_arrow)" stroke="var(--bg)" stroke-width="1.5" />
<text x="400" y="150" text-anchor="middle" font-size="11" fill="var(--_text)">Feature A</text>
<circle cx="160" cy="372" r="6" fill="var(--_arrow)" stroke="var(--bg)" stroke-width="1.5" />
<text x="160" y="390" text-anchor="middle" font-size="11" fill="var(--_text)">Feature B</text>
<circle cx="320" cy="332" r="6" fill="var(--_arrow)" stroke="var(--bg)" stroke-width="1.5" />
<text x="320" y="350" text-anchor="middle" font-size="11" fill="var(--_text)">Feature C</text>
</svg>