</g>
<g class="actor" data-id="DB" data-label="DB" data-type="participant">
  <rect x="744.0419999999999" y="30" width="80" height="40" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.75" />
  <text x="784.0419999999999" y="50" font-size="14" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">DB</text>
</g>
</svg>