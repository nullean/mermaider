<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 854.0419999999999 520" width="854.0419999999999" height="520" style="--bg:#FFFFFF;--fg:#27272A;--accent:#3b82f6">
<style>
  text { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  .mono { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 55%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 35%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 32%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 70%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 4%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 22%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 4%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 8%, var(--bg));
    --_accent-fill:   color-mix(in srgb, var(--accent, var(--fg)) 8%, var(--bg));
    --_accent-stroke: color-mix(in srgb, var(--accent, var(--fg)) 20%, var(--bg));
    --_accent-text:   color-mix(in srgb, var(--accent, var(--fg)) 65%, var(--bg));
  }
  .node, .actor, .entity, .class-node { filter: drop-shadow(0 1px 3px rgba(0,0,0,.07)); }
  .subgraph { filter: drop-shadow(0 1px 2px rgba(0,0,0,.04)); }
</style>

<defs>
  <marker id="seq-arrow" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto-start-reverse">
    <polygon points="0 0, 12 6, 0 12" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto-start-reverse">
    <polyline points="0 0, 12 6, 0 12" fill="none" stroke="var(--_arrow)" stroke-width="1.5" />
  </marker>
</defs>

<line class="lifeline" data-actor="Browser" x1="74.97999999999999" y1="70" x2="74.97999999999999" y2="490" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="CDN" x1="214.98" y1="70" x2="214.98" y2="490" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="LB" x1="359.51099999999997" y1="70" x2="359.51099999999997" y2="490" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="App" x1="504.042" y1="70" x2="504.042" y2="490" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Cache" x1="644.0419999999999" y1="70" x2="644.0419999999999" y2="490" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="DB" x1="784.0419999999999" y1="70" x2="784.0419999999999" y2="490" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="Browser" data-to="CDN" data-label="Static assets" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="74.97999999999999" y1="90" x2="214.98" y2="90" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#seq-arrow)" />
  <text x="144.98" y="80" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Static assets</text>
</g>
<g class="message" data-from="Browser" data-to="LB" data-label="API request" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="74.97999999999999" y1="130" x2="359.51099999999997" y2="130" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#seq-arrow)" />
  <text x="217.2455" y="120" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">API request</text>
</g>
<g class="message" data-from="LB" data-to="App" data-label="Forward" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="359.51099999999997" y1="170" x2="504.042" y2="170" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#seq-arrow)" />
  <text x="431.77649999999994" y="160" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Forward</text>
</g>
<g class="message" data-from="App" data-to="Cache" data-label="Check cache" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="504.042" y1="210" x2="644.0419999999999" y2="210" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#seq-arrow)" />
  <text x="574.0419999999999" y="200" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Check cache</text>
</g>
<g class="message" data-from="Cache" data-to="App" data-label="Miss" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="644.0419999999999" y1="250" x2="504.042" y2="250" stroke="var(--_line)" stroke-width="2.25" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="574.0419999999999" y="240" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Miss</text>
</g>
<g class="message" data-from="App" data-to="DB" data-label="Query" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="504.042" y1="290" x2="784.0419999999999" y2="290" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#seq-arrow)" />
  <text x="644.0419999999999" y="280" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Query</text>
</g>
<g class="message" data-from="DB" data-to="App" data-label="Result" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="784.0419999999999" y1="330" x2="504.042" y2="330" stroke="var(--_line)" stroke-width="2.25" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="644.0419999999999" y="320" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Result</text>
</g>
<g class="message" data-from="App" data-to="Cache" data-label="Store" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="504.042" y1="370" x2="644.0419999999999" y2="370" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#seq-arrow)" />
  <text x="574.0419999999999" y="360" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Store</text>
</g>
<g class="message" data-from="App" data-to="LB" data-label="Response" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="504.042" y1="410" x2="359.51099999999997" y2="410" stroke="var(--_line)" stroke-width="2.25" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="431.77649999999994" y="400" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Response</text>
</g>
<g class="message" data-from="LB" data-to="Browser" data-label="Response" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="359.51099999999997" y1="450" x2="74.97999999999999" y2="450" stroke="var(--_line)" stroke-width="2.25" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="217.2455" y="440" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Response</text>
</g>
<g class="actor" data-id="Browser" data-label="Browser" data-type="participant">
  <rect x="29.999999999999993" y="30" width="89.96" height="40" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.75" />
  <text x="74.97999999999999" y="50" font-size="14" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Browser</text>
</g>
<g class="actor" data-id="CDN" data-label="CDN" data-type="participant">
