</g>
<g class="actor" data-id="App" data-label="App" data-type="participant">
  <rect x="464.042" y="30" width="80" height="40" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.75" />
