<text x="157.24" y="328.15999999999997" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">No</text>
</g>
<g class="node" data-id="A" data-label="Start" data-shape="rectangle">
  <rect x="93.424" y="40" width="80.424" height="46.2" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.5" />
