<path class="edge" data-from="B" data-to="D" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="No" d="M133.63600000000002,292.15999999999997 L133.63600000000002,322.15999999999997 Q133.63600000000002,328.15999999999997 139.63600000000002,328.15999999999997 L186.64600000000002,328.15999999999997 Q192.64600000000002,328.15999999999997 192.64600000000002,334.15999999999997 L192.64600000000002,364.15999999999997" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="B" data-to="C" data-label="Yes">
