<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 323.132 388.3" width="323.132" height="388.3" style="--bg:#FFFFFF;--fg:#27272A;--accent:#3b82f6">
<style>
  text { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  .mono { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 55%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 35%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 32%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 70%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 4%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 22%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 4%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 8%, var(--bg));
    --_accent-fill:   color-mix(in srgb, var(--accent, var(--fg)) 8%, var(--bg));
    --_accent-stroke: color-mix(in srgb, var(--accent, var(--fg)) 20%, var(--bg));
    --_accent-text:   color-mix(in srgb, var(--accent, var(--fg)) 65%, var(--bg));
  }
  .node, .actor, .entity, .class-node { filter: drop-shadow(0 1px 3px rgba(0,0,0,.07)); }
  .subgraph { filter: drop-shadow(0 1px 2px rgba(0,0,0,.04)); }
</style>

<defs>
  <marker id="arrowhead" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto">
    <polygon points="0 0, 12 6, 0 12" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="1" refY="6" orient="auto-start-reverse">
    <polygon points="12 0, 0 6, 12 12" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>

<path class="edge" data-from="_start" data-to="isPositive" data-style="solid" data-arrow-start="false" data-arrow-end="true" d="M160.369,80 L160.369,152" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<path class="edge" data-from="isPositive" data-to="Positive" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="if n &gt; 0" d="M160.369,230.1 L160.369,260.1 Q160.369,266.1 154.369,266.1 L96.586,266.1 Q90.586,266.1 90.586,272.1 L90.586,302.1" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<path class="edge" data-from="isPositive" data-to="Negative" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="if n &lt; 0" d="M160.369,230.1 L160.369,260.1 Q160.369,266.1 166.369,266.1 L224.152,266.1 Q230.152,266.1 230.152,272.1 L230.152,302.1" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="isPositive" data-to="Positive" data-label="if n &gt; 0">
  <rect x="108.32780000000001" y="250.3" width="48.25599999999999" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="132.4558" y="266.1" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">if n &gt; 0</text>
</g>
<g class="edge-label" data-from="isPositive" data-to="Negative" data-label="if n &lt; 0">
  <rect x="164.1542" y="250.3" width="48.25599999999999" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="188.2822" y="266.1" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">if n &lt; 0</text>
</g>
<g class="node" data-id="isPositive" data-label="" data-shape="diamond">
  <polygon points="160.369,152 199.41899999999998,191.05 160.369,230.10000000000002 121.319,191.05" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="160.369" y="191.05" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995"></text>
</g>
<g class="node" data-id="_start" data-label="" data-shape="statestart">
  <circle cx="160.369" cy="60" r="12" fill="var(--_text)" stroke="none" />
  
</g>
<g class="node" data-id="Positive" data-label="Positive" data-shape="rounded">
  <rect x="40" y="302.1" width="101.172" height="46.2" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="90.586" y="325.20000000000005" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Positive</text>
</g>
<g class="node" data-id="Negative" data-label="Negative" data-shape="rounded">
  <rect x="177.172" y="302.1" width="105.96000000000001" height="46.2" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="230.152" y="325.20000000000005" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Negative</text>
</g>
</svg>