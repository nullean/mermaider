<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 269.94 704.8" width="269.94" height="704.8" style="--bg:#FFFFFF;--fg:#27272A;--accent:#3b82f6">
<style>
  text { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  .mono { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 55%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 35%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 32%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 70%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 4%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 22%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 4%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 8%, var(--bg));
    --_accent-fill:   color-mix(in srgb, var(--accent, var(--fg)) 8%, var(--bg));
    --_accent-stroke: color-mix(in srgb, var(--accent, var(--fg)) 20%, var(--bg));
    --_accent-text:   color-mix(in srgb, var(--accent, var(--fg)) 65%, var(--bg));
  }
  .node, .actor, .entity, .class-node { filter: drop-shadow(0 1px 3px rgba(0,0,0,.07)); }
  .subgraph { filter: drop-shadow(0 1px 2px rgba(0,0,0,.04)); }
</style>

<defs>
  <marker id="arrowhead" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto">
    <polygon points="0 0, 12 6, 0 12" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="1" refY="6" orient="auto-start-reverse">
    <polygon points="12 0, 0 6, 12 12" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>

<path class="edge" data-from="_start" data-to="Draft" data-style="solid" data-arrow-start="false" data-arrow-end="true" d="M96.97,80 L96.97,152" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<path class="edge" data-from="Draft" data-to="Review" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="submit" d="M96.97,198.2 L96.97,270.2" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<path class="edge" data-from="Review" data-to="Published" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="approve" d="M96.97,316.4 L96.97,388.4" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<path class="edge" data-from="Review" data-to="Draft" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="reject" d="M145.162,293.29999999999995 L183.94,293.29999999999995 Q189.94,293.29999999999995 189.94,287.29999999999995 L189.94,181.1 Q189.94,175.1 183.94,175.1 L137.182,175.1" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<path class="edge" data-from="Published" data-to="Archived" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="archive" d="M96.97,434.59999999999997 L96.97,506.59999999999997" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<path class="edge" data-from="Archived" data-to="_end" data-style="solid" data-arrow-start="false" data-arrow-end="true" d="M96.97,552.8 L96.97,624.8" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="Draft" data-to="Review" data-label="submit">
  <rect x="71.86999999999999" y="211.2" width="50.20000000000001" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="96.97" y="227" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">submit</text>
</g>
