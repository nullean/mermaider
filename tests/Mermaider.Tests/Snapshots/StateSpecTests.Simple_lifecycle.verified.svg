  <rect x="66.038" y="329.4" width="61.864" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="96.97" y="345.2" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">approve</text>
</g>
<g class="edge-label" data-from="Review" data-to="Draft" data-label="reject">
  <rect x="166.136" y="206.57999999999998" width="47.608000000000004" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="189.94" y="222.38" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">reject</text>
</g>
<g class="edge-label" data-from="Published" data-to="Archived" data-label="archive">
  <rect x="67.982" y="447.59999999999997" width="57.976000000000006" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="96.97" y="463.4" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">archive</text>
</g>
<g class="node" data-id="_start" data-label="" data-shape="statestart">
  <circle cx="96.97" cy="60" r="12" fill="var(--_text)" stroke="none" />
  
</g>
<g class="node" data-id="Draft" data-label="Draft" data-shape="rounded">
  <rect x="56.758" y="152" width="80.42399999999999" height="46.2" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="96.97" y="175.1" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Draft</text>
</g>
<g class="node" data-id="Review" data-label="Review" data-shape="rounded">
  <rect x="48.778" y="270.2" width="96.384" height="46.2" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="96.97" y="293.3" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Review</text>
</g>
<g class="node" data-id="Published" data-label="Published" data-shape="rounded">
  <rect x="40" y="388.4" width="113.94" height="46.2" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="96.97" y="411.5" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Published</text>
</g>
<g class="node" data-id="Archived" data-label="Archived" data-shape="rounded">
  <rect x="42.394" y="506.59999999999997" width="109.152" height="46.2" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="96.97" y="529.6999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Archived</text>
</g>
<g class="node" data-id="_end" data-label="" data-shape="stateend">
  <circle cx="96.97" cy="644.8" r="12" fill="none" stroke="var(--_text)" stroke-width="4" />
<circle cx="96.97" cy="644.8" r="8" fill="var(--_text)" stroke="none" />
  
</g>
</svg>