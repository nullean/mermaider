<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300.192 268" width="300.192" height="268" style="--bg:#FFFFFF;--fg:#27272A;--accent:#3b82f6">
<style>
  text { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  .mono { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 55%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 35%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 32%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 70%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 4%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 22%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 4%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 8%, var(--bg));
    --_accent-fill:   color-mix(in srgb, var(--accent, var(--fg)) 8%, var(--bg));
    --_accent-stroke: color-mix(in srgb, var(--accent, var(--fg)) 20%, var(--bg));
    --_accent-text:   color-mix(in srgb, var(--accent, var(--fg)) 65%, var(--bg));
  }
  .node, .actor, .entity, .class-node { filter: drop-shadow(0 1px 3px rgba(0,0,0,.07)); }
  .subgraph { filter: drop-shadow(0 1px 2px rgba(0,0,0,.04)); }
</style>

<defs>
  <marker id="seq-arrow" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto-start-reverse">
    <polygon points="0 0, 12 6, 0 12" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto-start-reverse">
    <polyline points="0 0, 12 6, 0 12" fill="none" stroke="var(--_arrow)" stroke-width="1.5" />
  </marker>
</defs>

<g class="block" data-type="break" data-label="When rate limited">
  <rect x="30" y="118" width="240.192" height="60" rx="8" ry="8" fill="none" stroke="var(--_group-stroke)" stroke-width="1.75" />
  <rect x="30" y="118" width="156.04" height="18" rx="6" ry="6" fill="var(--_group-hdr)" stroke="var(--_group-stroke)" stroke-width="1.75" />
  <text x="36" y="127" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">break [When rate limited]</text>
</g>
<line class="lifeline" data-actor="Client" x1="80" y1="70" x2="80" y2="238" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Server" x1="220" y1="70" x2="220" y2="238" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="Client" data-to="Server" data-label="Request" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="80" y1="90" x2="220" y2="90" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#seq-arrow)" />
  <text x="150" y="80" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">Request</text>
</g>
<g class="message" data-from="Server" data-to="Client" data-label="429 Too Many Requests" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="220" y1="158" x2="80" y2="158" stroke="var(--_line)" stroke-width="2.25" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="150" y="148" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">429 Too Many Requests</text>
</g>
<g class="message" data-from="Server" data-to="Client" data-label="200 OK" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="220" y1="198" x2="80" y2="198" stroke="var(--_line)" stroke-width="2.25" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="150" y="188" font-size="13" text-anchor="middle" font-weight="400" fill="var(--_text-sec)" dy="4.55">200 OK</text>
</g>
<g class="actor" data-id="Client" data-label="Client" data-type="participant">
  <rect x="40" y="30" width="80" height="40" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.75" />
  <text x="80" y="50" font-size="14" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Client</text>
</g>
<g class="actor" data-id="Server" data-label="Server" data-type="participant">
  <rect x="179.808" y="30" width="80.384" height="40" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.75" />
  <text x="220" y="50" font-size="14" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Server</text>
</g>
</svg>