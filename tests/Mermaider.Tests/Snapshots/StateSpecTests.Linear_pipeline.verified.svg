  <text x="96.97" y="529.6999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Stored</text>
</g>
<g class="node" data-id="Published" data-label="Published" data-shape="rounded">
  <rect x="40" y="624.8" width="113.94" height="46.2" rx="10" ry="10" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="2" />
  <text x="96.97" y="647.9" text-anchor="middle" font-size="14" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Published</text>
</g>
