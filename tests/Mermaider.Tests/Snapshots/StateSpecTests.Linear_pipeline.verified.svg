  <rect x="69.926" y="447.59999999999997" width="54.088" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="96.97" y="463.4" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">persist</text>
</g>
<g class="edge-label" data-from="Stored" data-to="Published" data-label="notify">
  <rect x="74.462" y="565.8" width="45.016" height="31.6" rx="10" ry="10" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
<text x="96.97" y="581.5999999999999" text-anchor="middle" font-size="12" font-weight="400" fill="var(--_text-sec)" dy="4.199999999999999">notify</text>
</g>
<g class="node" data-id="_start" data-label="" data-shape="statestart">
  <circle cx="96.97" cy="60" r="12" fill="var(--_text)" stroke="none" />
  
</g>
