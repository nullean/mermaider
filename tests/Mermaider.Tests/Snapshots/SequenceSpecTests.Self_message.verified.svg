<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224.906 330" width="224.906" height="330" style="--bg:#FFFFFF;--fg:#27272A;--accent:#3b82f6">
<style>
  text { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  .mono { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 55%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 35%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 20%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 32%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 70%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 4%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 22%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 4%, var(--bg));
    --_group-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 10%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 8%, var(--bg));
    --_accent-fill:   color-mix(in srgb, var(--accent, var(--fg)) 8%, var(--bg));
    --_accent-stroke: color-mix(in srgb, var(--accent, var(--fg)) 20%, var(--bg));
    --_accent-text:   color-mix(in srgb, var(--accent, var(--fg)) 65%, var(--bg));
  }
  .node, .actor, .entity, .class-node { filter: drop-shadow(0 1px 3px rgba(0,0,0,.07)); }
  .subgraph { filter: drop-shadow(0 1px 2px rgba(0,0,0,.04)); }
</style>

<defs>
  <marker id="seq-arrow" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto-start-reverse">
    <polygon points="0 0, 12 6, 0 12" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto-start-reverse">
    <polyline points="0 0, 12 6, 0 12" fill="none" stroke="var(--_arrow)" stroke-width="1.5" />
  </marker>
</defs>

<line class="lifeline" data-actor="Service" x1="72.586" y1="70" x2="72.586" y2="300" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="Service" data-to="Service" data-label="Initialize" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="72.586,90 102.586,90 102.586,110 72.586,110" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#seq-arrow)" />
  <text x="110.586" y="100" font-size="13" text-anchor="start" font-weight="400" fill="var(--_text-sec)" dy="4.55">Initialize</text>
</g>
<g class="message" data-from="Service" data-to="Service" data-label="Validate config" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="72.586,160 102.586,160 102.586,180 72.586,180" fill="none" stroke="var(--_line)" stroke-width="2.25" marker-end="url(#seq-arrow)" />
  <text x="110.586" y="170" font-size="13" text-anchor="start" font-weight="400" fill="var(--_text-sec)" dy="4.55">Validate config</text>
</g>
<g class="message" data-from="Service" data-to="Service" data-label="Ready" data-line-style="dashed" data-arrow-head="filled" data-self="true">
  <polyline points="72.586,230 102.586,230 102.586,250 72.586,250" fill="none" stroke="var(--_line)" stroke-width="2.25" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="110.586" y="240" font-size="13" text-anchor="start" font-weight="400" fill="var(--_text-sec)" dy="4.55">Ready</text>
</g>
<g class="actor" data-id="Service" data-label="Service" data-type="participant">
  <rect x="30" y="30" width="85.172" height="40" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.75" />
  <text x="72.586" y="50" font-size="14" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.8999999999999995">Service</text>
</g>
</svg>